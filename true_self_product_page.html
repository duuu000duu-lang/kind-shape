<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comfortable Chest Binder for Daily Wear</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f7f7f7;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .badge {
            display: inline-block;
            background: #ff4757;
            color: white;
            font-size: 12px;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 4px;
            margin-bottom: 10px;
        }
        .product-image {
            width: 100%;
            height: auto;
            border-radius: 8px;
            margin-bottom: 20px;
            object-fit: cover;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        .price {
            font-size: 22px;
            color: #ff4757;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .price span {
            font-size: 14px;
            color: #999;
            text-decoration: line-through;
            margin-left: 10px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        .size-options {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .size-btn {
            padding: 10px 16px;
            border: 1px solid #ddd;
            background: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .size-btn.active {
            border-color: #ff4757;
            color: #ff4757;
            background: #fff5f5;
        }
        .btn-paypal {
            width: 100%;
            background-color: #ffc439;
            color: #111;
            border: none;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-paypal:hover {
            background-color: #f4bb33;
        }
        footer {
            text-align: center;
            margin-top: 30px;
            font-size: 12px;
            color: #777;
        }
        footer a {
            color: #ff4757;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="badge">BEST SELLER</div>
    <!-- 请把 src="您的图片链接" 替换为您实际的商品图片地址 -->

    <div class="price">$49.90 <span>$79.99</span></div>

    <div class="form-group">
        <label>国家/地区 (Country)</label>
        <select name="country">
            <option value="" disabled selected>请选择国家/地区 / Select Country</option>
            <option value="CN">中国 (China)</option>
            <option value="HK">中国香港 (Hong Kong)</option>
            <option value="MO">中国澳门 (Macao)</option>
            <option value="TW">中国台湾 (Taiwan)</option>
            <option value="SG">新加坡 (Singapore)</option>
            <option value="MY">马来西亚 (Malaysia)</option>
            <option value="TH">泰国 (Thailand)</option>
            <option value="VN">越南 (Vietnam)</option>
            <option value="ID">印度尼西亚 (Indonesia)</option>
            <option value="PH">菲律宾 (Philippines)</option>
            <option value="KH">柬埔寨 (Cambodia)</option>
            <option value="MM">缅甸 (Myanmar)</option>
            <option value="BN">文莱 (Brunei)</option>
            <option value="LA">老挝 (Laos)</option>
            <option value="JP">日本 (Japan)</option>
            <option value="KR">韩国 (South Korea)</option>
            <option value="IN">印度 (India)</option>
            <option value="US">美国 (United States)</option>
            <option value="CA">加拿大 (Canada)</option>
            <option value="MX">墨西哥 (Mexico)</option>
            <option value="GB">英国 (United Kingdom)</option>
            <option value="DE">德国 (Germany)</option>
            <option value="FR">法国 (France)</option>
            <option value="IT">意大利 (Italy)</option>
            <option value="ES">西班牙 (Spain)</option>
            <option value="NL">荷兰 (Netherlands)</option>
            <option value="CH">瑞士 (Switzerland)</option>
            <option value="SE">瑞典 (Sweden)</option>
            <option value="AU">澳大利亚 (Australia)</option>
            <option value="NZ">新西兰 (New Zealand)</option>
            <option value="OTHER">其他国家/地区 (Other Worldwide)</option>

    </div>

<footer>
